<div style="font-family:sans-serif;max-width:560px;margin:0 auto;padding:32px 24px">
  <h2 style="color:{{STATUS_COLOR}};font-size:20px;font-weight:800;margin-bottom:8px">
    KYC {{STATUS_TITLE}}
  </h2>
  <p style="color:#64748B;font-size:15px;line-height:1.6;margin-bottom:20px">
    Hi {{NAME}}, your identity verification has been <strong>{{STATUS}}</strong>.
    {{NOTE_BLOCK}}
  </p>
  <a href="{{APP}}/dashboard/{{DASHBOARD_PATH}}"
    style="background:#1FA3A3;color:#fff;padding:11px 22px;border-radius:9px;text-decoration:none;font-weight:700;font-size:14px">
    {{BUTTON_TEXT}}
  </a>
</div>
